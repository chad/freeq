name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --exclude freeq-av-client --exclude freeq-eliza --exclude freeq-av --exclude freeq-av-image --exclude freeq-claude-mcp

      - name: Test
        run: cargo test --workspace --exclude freeq-av-client --exclude freeq-eliza --exclude freeq-av --exclude freeq-av-image --exclude freeq-claude-mcp

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            mapfile -t rust_files < <(git diff --name-only --diff-filter=ACMRT "$base" "$head" -- '*.rs')
            if [ "${#rust_files[@]}" -eq 0 ]; then
              echo "No Rust files changed."
              exit 0
            fi
          fi

          cargo clippy --workspace --exclude freeq-av-client --exclude freeq-eliza --exclude freeq-av --exclude freeq-av-image --exclude freeq-claude-mcp -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          mapfile -t rust_files < <(git diff --name-only --diff-filter=ACMRT "$base" "$head" -- '*.rs')
          if [ "${#rust_files[@]}" -eq 0 ]; then
            echo "No Rust files changed."
            exit 0
          fi

          rustfmt --check --edition 2024 "${rust_files[@]}"

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit (RustSec advisories)
        run: cargo audit

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit (web client)
        working-directory: freeq-app
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit (JS SDK)
        working-directory: freeq-sdk-js
        run: npm audit --omit=dev --audit-level=high

  web:
    name: Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            freeq-app/package-lock.json
            freeq-sdk-js/package-lock.json

      - name: Install SDK deps
        working-directory: freeq-sdk-js
        run: npm ci

      - name: Install
        working-directory: freeq-app
        run: npm ci

      - name: Type check
        working-directory: freeq-app
        run: npx tsc --noEmit

      - name: Build
        working-directory: freeq-app
        run: npm run build
