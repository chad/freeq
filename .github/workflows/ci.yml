name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux audio dev packages
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --exclude freeq-av-client --exclude freeq-eliza --exclude freeq-av --exclude freeq-av-image

      - name: Test
        run: cargo test --workspace --exclude freeq-av-client --exclude freeq-eliza --exclude freeq-av --exclude freeq-av-image

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux audio dev packages
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --exclude freeq-av-client --exclude freeq-eliza --exclude freeq-av --exclude freeq-av-image -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit (RustSec advisories)
        run: cargo audit

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit (web client)
        working-directory: freeq-app
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit (JS SDK)
        working-directory: freeq-sdk-js
        run: npm audit --omit=dev --audit-level=high

  web:
    name: Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            freeq-app/package-lock.json
            freeq-sdk-js/package-lock.json

      - name: Install SDK deps
        working-directory: freeq-sdk-js
        run: npm ci

      - name: Install
        working-directory: freeq-app
        run: npm ci

      - name: Type check
        working-directory: freeq-app
        run: npx tsc --noEmit

      - name: Build
        working-directory: freeq-app
        run: npm run build
