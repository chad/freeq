name: freeq-macos
options:
  bundleIdPrefix: at.freeq
  deploymentTarget:
    macOS: "14.4"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.4"

targets:
  freeq-macos:
    type: application
    platform: macOS
    sources:
      - path: freeq-macos
        type: group
      - path: Generated/freeq.swift
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: at.freeq.macos
        PRODUCT_NAME: freeq
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
        INFOPLIST_KEY_CFBundleDisplayName: freeq
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "freeq uses your microphone for voice and video calls."
        INFOPLIST_KEY_NSCameraUsageDescription: "freeq uses your camera for video calls."
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS:
          - "-framework"
          - "Security"
          - "-framework"
          - "SystemConfiguration"
          - "-framework"
          - "AuthenticationServices"
          # AV (voice/video) — frameworks the Rust SDK's iroh-live/videotoolbox
          # backend and the Swift capture/render paths link against.
          - "-framework"
          - "AVFoundation"
          - "-framework"
          - "AVKit"
          - "-framework"
          - "AudioToolbox"
          - "-framework"
          - "CoreAudio"
          - "-framework"
          - "CoreMedia"
          - "-framework"
          - "CoreVideo"
          - "-framework"
          - "VideoToolbox"
          - "-framework"
          - "Network"
          - "-lc++"
        CLANG_ENABLE_MODULES: YES
    dependencies:
      # Static-lib xcframework — links into the binary, must NOT be embedded
      # (an embedded .a in Contents/Frameworks fails codesign).
      - framework: FreeqSDK.xcframework
        embed: false
    entitlements:
      path: freeq-macos/freeq-macos.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.camera: true
